<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .opacityExample {
            /* transition: opacity 2s cubic-bezier(1,-2.82, 1, 1); */
            transition: opacity 2s cubic-bezier(0.3,-0.2, 0.45, 0.94);
            /* transition: opacity 2s linear; */
        }
        .opacityExample:hover {
            opacity: 0;
        }
        .stackExample {
            position: relative;
            background-color: aqua;
            width: 70vw;
            height: 40vh;
            border: 1px dotted blue;
            z-index: 1;
        }
        .stackExample > div {
            width: 100%;
            height: 25%;
        }
        .stackChild:first-child {
            position: relative;
            z-index: 1;
            border: 2px dashed blueviolet;
            height: 8em;
            margin-bottom: 1em;
            margin-top: 2em;
            z-index: -1;
        }
        .stackChild:last-child {
            position: relative;
            z-index: 2; /* put .green-box above blueviolet box */
            background: lightgreen;
            width: 50%;
            left: 5%;
            top: -70%;
            height: 7em;
            /* opacity: 0.9; */
            opacity: 1;
        }
    </style>
</head>
<body>
    <p>
        text is here about rick
    </p>
    <img src="../img/mrMisses.jpg" alt="" srcset="" class="opacityExample">
    <!-- stacking context -->
    <div class="stackExample">
        <div class="stackChild">stack 1</div>
        <div class="stackChild">stack 2</div>
        <div class="stackChild">stack 3</div>
    </div>
</body>
</html>
